<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>DRG Supervisor — Autorização de Ponto</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="manifest" href="supervisor-manifest.json">
<meta name="theme-color" content="#1976D2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DRG Supervisor">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif}
  html,body{height:100%;background:#f1f5f9;color:#1e293b}
  body{display:flex;flex-direction:column;overflow:hidden}

  /* LOGIN */
  .login-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1e40af 0%,#1976D2 100%)}
  .login-card{background:#fff;border-radius:18px;padding:28px 22px;max-width:380px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.3)}
  .login-logo{width:64px;height:64px;border-radius:50%;display:block;margin:0 auto 12px;object-fit:cover}
  .login-title{text-align:center;font-size:20px;font-weight:700;color:#1e293b}
  .login-sub{text-align:center;font-size:13px;color:#64748b;margin-bottom:18px}
  .login-input{width:100%;padding:13px 14px;border:1px solid #cbd5e1;border-radius:10px;font-size:15px;margin-bottom:10px;outline:none}
  .login-input:focus{border-color:#1976D2;box-shadow:0 0 0 3px #dbeafe}
  .login-btn{width:100%;padding:14px;background:#1976D2;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
  .login-btn:disabled{opacity:.6;cursor:not-allowed}
  .login-err{display:none;background:#fee2e2;color:#c62828;padding:10px;border-radius:8px;font-size:13px;margin-top:10px;line-height:1.4}

  /* TOP BAR */
  .topbar{background:#1976D2;color:#fff;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .topbar .av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
  .topbar .info{flex:1;min-width:0}
  .topbar .nome{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .sub{font-size:11px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .logout{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer}

  /* BADGE TOTAL */
  .header-stat{background:#fff;padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:14px}
  .stat-circle{width:54px;height:54px;border-radius:50%;background:#ef4444;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;animation:pulseRed 1.6s ease-in-out infinite;flex-shrink:0}
  .stat-circle.empty{background:#dcfce7;color:#16a34a;animation:none}
  @keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}
  .stat-title{font-size:15px;font-weight:700;color:#1e293b}
  .stat-sub{font-size:12px;color:#64748b;margin-top:2px}

  /* SEARCH */
  .search-bar{padding:12px 14px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;gap:8px}
  .search-input{flex:1;padding:11px 14px;border:1px solid #cbd5e1;border-radius:10px;font-size:15px;outline:none}
  .search-input:focus{border-color:#1976D2;box-shadow:0 0 0 3px #dbeafe}
  .search-btn{padding:11px 16px;background:#1976D2;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}

  /* LISTA */
  .lista-wrap{flex:1;overflow-y:auto;padding:10px 14px 20px;background:#f1f5f9}
  .lista-sec-title{font-size:11px;color:#64748b;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin:8px 4px 6px}

  .card-ped{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:5px solid #ef4444}
  .card-ped.folga{border-left-color:#7e22ce}
  .card-ped.recente{border-left-color:#E65100}
  .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
  .card-nome{font-weight:700;font-size:15px;color:#1e293b}
  .card-reg{font-size:11px;color:#64748b;margin-top:1px}
  .card-tag{background:#fef3c7;color:#92400e;padding:3px 9px;border-radius:11px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
  .card-tag.folga{background:#f3e8ff;color:#7e22ce}
  .card-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:#475569;margin-top:6px;background:#f8fafc;padding:9px;border-radius:8px}
  .card-meta strong{color:#1e293b;display:block;font-size:14px;font-weight:700}
  .card-meta small{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
  .card-motivo{margin-top:7px;background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:7px 9px;font-size:12px;color:#713f12;line-height:1.45}
  .card-motivo strong{color:#92400e}
  .card-tempo{font-size:11px;color:#64748b;margin-top:7px}
  .card-actions{display:flex;gap:8px;margin-top:11px}
  .btn-aut{flex:1;padding:13px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
  .btn-aut:active{background:#15803d}
  .btn-rec{flex:1;padding:13px;background:#fff;color:#c62828;border:1px solid #fca5a5;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
  .btn-rec:active{background:#fee2e2}
  .btn-edit{flex:1;padding:13px;background:#fff;color:#1565C0;border:1px solid #90caf9;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
  .btn-edit:active{background:#e3f2fd}

  .empty{text-align:center;padding:40px 20px;color:#94a3b8}
  .empty-icon{font-size:48px;margin-bottom:8px}

  /* RESULTADO DA BUSCA */
  .busca-result{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:5px solid #1976D2}
  .br-nome{font-weight:700;font-size:15px;color:#1e293b}
  .br-info{font-size:12px;color:#64748b;margin-top:3px;line-height:1.5}

  /* MODAL RECUSA */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.show{display:flex}
  .modal-card{background:#fff;border-radius:16px;max-width:380px;width:100%;padding:22px;box-shadow:0 12px 48px rgba(0,0,0,.35)}
  .modal-title{font-size:17px;font-weight:700;color:#1e293b;margin-bottom:6px}
  .modal-text{font-size:13px;color:#475569;margin-bottom:14px;line-height:1.45}
  .modal-input{width:100%;padding:11px 13px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px}
  .modal-btns{display:flex;gap:8px;margin-top:14px}
  .modal-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
  .modal-btn-primary{background:#c62828;color:#fff}
  .modal-btn-secondary{background:#f1f5f9;color:#475569}

  /* TOAST */
  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-60px);background:#1e293b;color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:10000;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.success{background:#16a34a}
  .toast.error{background:#dc2626}

  /* SPINNER */
  .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#1976D2;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* BANNER NOVA VERSAO */
  #banner-nova-versao{display:none;position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#1e40af,#2563eb);color:#fff;padding:10px 14px;text-align:center;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.25);font-size:13px;font-weight:600}
</style>

<div id="banner-nova-versao">
  🎉 Nova versão do app disponível!
  <button onclick="location.reload()" style="margin-left:10px;background:#fff;color:#1e40af;border:none;padding:6px 14px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px">Atualizar agora</button>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <img class="login-logo" src="logo.png" alt="DRG" onerror="this.style.display='none'">
    <div class="login-title">DRG Supervisor</div>
    <div class="login-sub">Liberação de batidas de ponto</div>

<div id="app" style="display:none;flex:1;flex-direction:column;overflow:hidden">

  <div class="topbar">

    <div class="info">
      <div class="nome" id="sup-nome">—</div>
      <div class="sub" id="sup-role">Supervisor de Ponto</div>
    </div>
    <button id="btn-notif-push" onclick="ativarNotificacoesSup()" title="Notificações no celular (app fechado)"

  <div class="search-bar">

<!-- MODAL RECUSA -->

    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" onclick="fecharModalRecusa()">Cancelar</button>
      <button class="modal-btn modal-btn-primary" onclick="confirmarRecusa()">Recusar</button>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=20260515a"></script>

<script>
'use strict';

// ─── CONFIG ─────────────────────────────────────────────────────────────────
const APROVACAO_WORKER = 'https://drg-aprovacao.zett-romao.workers.dev';
const _fs = firebase.firestore();
const _tenantId = new URLSearchParams(window.location.search).get('tenant')
                  || localStorage.getItem('drg_tenant')
                  || null;
function dbCol(name){
  return _tenantId
    ? _fs.collection('tenants').doc(_tenantId).collection(name)
    : _fs.collection(name);
}

// ─── ESTADO ────────────────────────────────────────────────────────────────
let currentUser     = null;     // dados do supervisor logado
let employeesCache  = [];       // colaboradores (carregados na entrada)
let pedidosUnsub    = null;     // unsubscribe do listener de pedidos
let pedidos         = [];       // pedidos pendentes em tempo real
let recusandoId     = null;     // id do pedido em processo de recusa

// ── Som de aviso: bip (Web Audio, sem arquivo) quando chega PEDIDO novo. #som-avisos
let _drgAudioCtx = null, _drgSeenAvisos = null;
function _somAvisosOn(){ return localStorage.getItem('drg_som_avisos') !== 'off'; }
function _tocarBip(){
  if(!_somAvisosOn()) return;
  try{
    _drgAudioCtx = _drgAudioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_drgAudioCtx; if(ctx.state==='suspended') ctx.resume();
    const t=ctx.currentTime;
    [[880,0],[1320,0.13]].forEach(([f,d])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t+d);
      g.gain.exponentialRampToValueAtTime(0.3,t+d+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+d+0.2);
      o.connect(g); g.connect(ctx.destination);
      o.start(t+d); o.stop(t+d+0.22);
    });
  }catch(_){}
}
function _avisoNovidade(ids){
  if(_drgSeenAvisos===null){ _drgSeenAvisos=new Set(ids); return false; }
  let novo=false;
  ids.forEach(id=>{ if(!_drgSeenAvisos.has(id)){ novo=true; _drgSeenAvisos.add(id); } });
  return novo;
}
function _renderSomBtn(){
  const b=document.getElementById('btn-som-avisos'); if(!b) return;
  const on=_somAvisosOn();
  b.textContent = on?'🔔':'🔕'; b.style.opacity = on?'1':'0.5';
  b.title = on?'Som de avisos LIGADO — clique para silenciar':'Som de avisos DESLIGADO — clique para ligar';
}
function _toggleSomAvisos(){
  const on=_somAvisosOn();
  localStorage.setItem('drg_som_avisos', on?'off':'on');
  _renderSomBtn();
  if(!on) _tocarBip();
}
document.addEventListener('click', ()=>{ try{ if(_drgAudioCtx&&_drgAudioCtx.state==='suspended') _drgAudioCtx.resume(); }catch(_){} });

// ─── HELPERS ───────────────────────────────────────────────────────────────
function toast(msg, type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast'+(type?' '+type:'')+' show';
  setTimeout(()=>el.classList.remove('show'), 3500);
}
function fmtHora(iso){
  const d=iso?new Date(iso):null;
  if(!d || isNaN(d.getTime())) return '—';
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function fmtMinAtras(iso){
  const d=iso?new Date(iso):null;
  if(!d || isNaN(d.getTime())) return '';
  const secs = Math.floor((Date.now() - d.getTime())/1000);
  if(secs < 60) return 'agora há pouco';
  const min = Math.floor(secs/60);
  if(min === 1) return '1 min atrás';
  if(min < 60) return `${min} min atrás`;
  const h = Math.floor(min/60);
  return `${h}h${(min%60).toString().padStart(2,'0')} atrás`;
}
const NOMES_BATIDA = {
  entrada: 'Entrada',
  intIni:  'Início do intervalo',
  intFim:  'Fim do intervalo',
  saida:   'Saída'
};

function _payrollScore(p){
  if(!p) return -1;
  const dias=Array.isArray(p.pontoManualDias)?p.pontoManualDias:[];
  const diasComBatida=dias.filter(d=>d&&(d.entrada||d.saida||d.intIni||d.intFim)).length;
  const valores=['valeTransporte','valeRefeicao','adiantamentoValor','adiantamento','insalubridade','acumuloFuncao','horasExtrasTotal']
    .reduce((s,k)=>s+(+p[k]>0?1:0),0);
  return (p.status==='fechada'?100000:0) + dias.length*1000 + diasComBatida*10 + valores;
}

function _pickPayrollDoc(docs){
  let best=null;
  docs.forEach(doc=>{
    const p={id:doc.id, ...doc.data()};
    if(!best || _payrollScore(p)>_payrollScore(best)) best=p;
  });
  return best;
}

// ─── AUTH ──────────────────────────────────────────────────────────────────
// ID do dispositivo (resiliente: localStorage → cookie → memória). O worker exige
// deviceId pra usuário não-master; sem ele dava "dispositivo não identificado" no
// login do Supervisor (o app de ponto/gestor já mandava; aqui faltava). #fix-deviceid
function _genDeviceId(){
  return (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
       : 'dev-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,12);
}
function _getDeviceId(){
  try{
    let id = localStorage.getItem('drg_device_id');
    if(!id){ id = _genDeviceId(); localStorage.setItem('drg_device_id', id); }
    if(id){ try{ document.cookie = 'drg_device_id='+id+';path=/;max-age=31536000;SameSite=Lax'; }catch(_){ } return id; }
  }catch(e){}
  try{
    const m = document.cookie.match(/(?:^|;\s*)drg_device_id=([^;]+)/);
    if(m && m[1]) return decodeURIComponent(m[1]);
    const id = _genDeviceId();
    document.cookie = 'drg_device_id='+id+';path=/;max-age=31536000;SameSite=Lax';
    if(/(?:^|;\s*)drg_device_id=/.test(document.cookie)) return id;
  }catch(e){}
  if(!window.__drgDevMem) window.__drgDevMem = _genDeviceId();
  return window.__drgDevMem;
}

async function doLogin(){
  const user = (document.getElementById('login-user').value||'').trim();
  const pass = document.getElementById('login-pass').value||'';
  const errEl= document.getElementById('login-err');
  const btn  = document.getElementById('login-btn');
  errEl.style.display='none';
  errEl.textContent='';
  if(!user || !pass){
    errEl.textContent='Preencha usuario e senha.';
    errEl.style.display='block';
    return;
  }
  btn.disabled=true; btn.textContent='Entrando...';
  try{
    // Login via worker — mesmo endpoint do painel principal
    const r = await fetch(APROVACAO_WORKER + '/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username:user, password:pass, deviceId:_getDeviceId() })
    });
    const data = await r.json().catch(()=>({}));
    if(!r.ok || !data.ok || !data.user || !data.customToken){
      errEl.textContent = data.erro || data.error || 'Usuario ou senha invalido.';
      errEl.style.display='block';
      return;
    }
    // Autentica no Firebase Auth com o customToken (precisa ANTES de ler perfis,
    // porque as Rules exigem usuario autenticado para acessar a colecao).
    await firebase.auth().signInWithCustomToken(data.customToken);
    currentUser = data.user;
    // Resolve a permissao: master tem sempre; perfis (role 'p_<id>') tem que
    // ler o doc perfis/<id> e olhar modules.autorizarPonto.
    let podeAutorizar = (currentUser.role === 'master');
    let perfilDiag = null; // info para diagnostico caso bloqueie
    if(!podeAutorizar){
      try{
        const role = currentUser.role || '';
        if(role.startsWith('p_')){
          const perfilId = role.replace('p_','');
          const psnap = await dbCol('perfis').doc(perfilId).get();
          if(psnap.exists){
            const perfil = psnap.data();
            perfilDiag = { id: perfilId, nome: perfil.nome || perfilId, modules: perfil.modules||{} };
            podeAutorizar = !!(perfil.modules && perfil.modules.autorizarPonto);
          } else {
            perfilDiag = { id: perfilId, erro: 'Perfil nao encontrado no banco' };
          }
        } else {
          // role legacy direto (ex: 'operador') — fallback no objeto user
          const mods = currentUser.modules || (currentUser.perfil && currentUser.perfil.modules) || {};
          podeAutorizar = !!mods.autorizarPonto;
          perfilDiag = { id: role, nome: role, modules: mods };
        }
      }catch(perr){
        console.error('lookup perfil', perr);
        perfilDiag = { erro: perr.message };
      }
    }
    if(!podeAutorizar){
      console.error('Sem permissao autorizarPonto. Diagnostico:', { user: currentUser, perfil: perfilDiag });
      try{ await firebase.auth().signOut(); }catch(_){}
      const nomePerfil = perfilDiag && perfilDiag.nome ? perfilDiag.nome
                       : perfilDiag && perfilDiag.id   ? perfilDiag.id
                       : (currentUser.role || '?');
      errEl.innerHTML = `Sem permissao para autorizar batidas.<br><br>
        <strong>Perfil em uso:</strong> ${nomePerfil}<br>

}

function iniciarListenerPedidos(){
  // Listener em tempo real nas autorizacoes pendentes
  pedidosUnsub = dbCol('autorizacoesPonto')
    .where('status','==','pendente')
    .onSnapshot(snap => {
      pedidos = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      // Remove pedidos expirados (validade vencida) — atualiza status no banco
      const agora = Date.now();
      pedidos = pedidos.filter(p => {
        if(!p.validadeAteEm) return true;
        const venc = new Date(p.validadeAteEm).getTime();

          dbCol('autorizacoesPonto').doc(p.id).update({
            status:'expirada', expiradoEm: new Date().toISOString()
          }).catch(()=>{});
          return false;
        }
        return true;
      });
      // Ordena: mais antigos primeiro (FIFO)
      pedidos.sort((a,b)=>(a.tentativaEm||'').localeCompare(b.tentativaEm||''));
      renderPedidos();
      _renderSomBtn();
      if(_avisoNovidade(pedidos.map(p=>p.id))) _tocarBip();   // bip em PEDIDO novo. #som-avisos
    }, err => {
      console.error('listener pedidos', err);
      toast('Erro: ' + err.message, 'error');

// Recalcula o horário PREVISTO da batida pela escala ATUAL do colaborador (override →
// período vigente → cadastro). Sem o motor completo do app: cobre a correção de
// horário no contrato/cadastro/período (não trata variações de ciclo). #autz-previsto-vivo
function _compRealSup(mesComp, anoComp, diaBatida){
  if(diaBatida >= 26){ let m=mesComp-1, a=anoComp; if(m<1){m=12;a--;} return {mes:m, ano:a, dia:diaBatida}; }
  return {mes:mesComp, ano:anoComp, dia:diaBatida};
}
function _previstoDoDiaSup(emp, mesComp, anoComp, diaBatida, tipoBatida){
  if(!emp || !mesComp || !anoComp || !diaBatida) return '';
  const r=_compRealSup(mesComp, anoComp, diaBatida);
  const ymd = r.ano+'-'+String(r.mes).padStart(2,'0')+'-'+String(r.dia).padStart(2,'0');
  let hor;
  const ov=(emp.overridesHorario||[]).find(o=>o.data===ymd);
  if(ov){ if(ov.tipo==='folga') return ''; hor={entrada:ov.horarioEntrada,saida:ov.horarioSaida,intIni:ov.horarioRefIni,intFim:ov.horarioRefFim}; }
  else {
    const pers=(emp.historicoEscalas||[]).slice().sort((a,b)=>(b.de||'').localeCompare(a.de||''));
    const per=pers.find(x=> (x.de||'')<=ymd && (!x.ate || x.ate>=ymd));
    const src=per||emp;
    hor={entrada:src.horarioEntrada,saida:src.horarioSaida,intIni:src.horarioRefIni,intFim:src.horarioRefFim};
    // Variantes com horário diferenciado por dia (parte da DEFINIÇÃO da escala):
    // 6x1A sáb 07–11 (4h), 6x1C sáb 08–12 (4h, sem refeição), 5x2A/B sexta 16:00.
    const esc=(per&&per.escala)||emp.escala||'';
    const dsem=new Date(r.ano, r.mes-1, r.dia).getDay();
    if(dsem===6 && esc==='6x1A'){ hor.saida='11:00'; hor.intIni=''; hor.intFim=''; }
    if(dsem===6 && esc==='6x1C'){ hor.saida='12:00'; hor.intIni=''; hor.intFim=''; }
    if(dsem===5 && (esc==='5x2A'||esc==='5x2B')){ hor.saida='16:00'; }
  }
  return hor[tipoBatida] || '';
}
function _toMinSup(hhmm){ const x=String(hhmm||'').split(':'); const h=parseInt(x[0]),m=parseInt(x[1]); return (isNaN(h)||isNaN(m))?null:h*60+m; }
// Rótulo da diferença conforme o TIPO da batida: sair/iniciar-pausa mais tarde = HORA EXTRA;
// entrar/voltar mais tarde = ATRASO. diff = real − previsto. #autz-extra-atraso
function _diffLabelSup(tipoBatida, diff){
  if(!diff) return '';
  const a=Math.abs(diff);
  const maisTrab = (tipoBatida==='saida' || tipoBatida==='intIni');
  if(diff>0) return maisTrab ? `+${a} min (hora extra)` : `+${a} min de atraso`;
  return maisTrab ? `−${a} min (saiu antes)` : `−${a} min adiantado`;
}

function _cardPedido(p){

  const _empSup = employeesCache.find(e=>e.id===p.employeeId);
  let previstoEf = p.horarioPrevisto || '', diff = p.diferencaMinutos || 0;
  const _pl = _previstoDoDiaSup(_empSup, p.mesComp, p.anoComp, p.diaBatida, p.tipoBatida);
  if(_pl){
    previstoEf = _pl;
    const _re=_toMinSup(p.horarioReal), _pe=_toMinSup(_pl);
    if(_re!=null && _pe!=null) diff = _re - _pe;

  const diffTxt = _diffLabelSup(p.tipoBatida, diff);
  const _maisTrab = (p.tipoBatida==='saida' || p.tipoBatida==='intIni');
  const diffCor = (diff>0 && !_maisTrab) ? '#c62828' : '#1976D2';   // só atraso real em vermelho; extra em azul
  const motivoBox = p.motivo

    : '';
  const matricula = p.employeeRegistro ? String(p.employeeRegistro).padStart(4,'0') : '—';
  return `
    <div class="card-ped ${classExtra}" id="ped-${p.id}">
      <div class="card-head">
        <div style="flex:1;min-width:0">
          <div class="card-nome">${(p.employeeNome||'—').replace(/</g,'&lt;')}</div>
          <div class="card-reg">Matrícula ${matricula}${(_empSup&&_empSup.posto) ? ' · Posto '+String(_empSup.posto).replace(/</g,'&lt;') : ''} ${p.employeeCpf ? '· CPF '+p.employeeCpf : ''}</div>
        </div>
        <span class="card-tag ${ehFolga?'folga':''}">${tag}</span>
      </div>
      <div class="card-meta">
        <div>
          <small>Batida solicitada</small>
          <strong>${nomeBat}</strong>
        </div>
        <div>
          <small>Hora real</small>
          <strong>${p.horarioReal||'—'}</strong>
        </div>
        ${previstoEf ? `<div>
          <small>Previsto${(previstoEf!==p.horarioPrevisto)?' (escala atual)':''}</small>
          <strong>${previstoEf}</strong>
        </div>` : ''}
        ${diffTxt ? `<div>
          <small>Diferença</small>
          <strong style="color:${diffCor}">${diffTxt}</strong>
        </div>` : ''}
      </div>
      ${motivoBox}
      <div class="card-tempo">⏱ Solicitado ${fmtMinAtras(p.tentativaEm)}</div>
      <div class="card-actions">
        <button class="btn-aut" onclick="autorizarPedido('${p.id}')" title="Registra na folha o horário REAL da batida (${p.horarioReal||'—'})">✓ AUTORIZAR</button>
        <button class="btn-edit" onclick="editarERegistrar('${p.id}')" title="Define o horário a registrar (ex.: o previsto, pra abonar o desvio)">✏️ Editar</button>
        <button class="btn-rec" onclick="abrirRecusa('${p.id}')">✕ Recusar</button>
      </div>
    </div>`;
}

// Grava a batida aprovada na FOLHA do colaborador (competência/dia do pedido).
// É aqui que a batida finalmente ENTRA na folha — só após a aprovação. #ponto-provisorio
async function _gravarBatidaNaFolha(p, horarioEfetivo){
  const empId = p.employeeId, mes = p.mesComp, ano = p.anoComp, dia = p.diaBatida, tp = p.tipoBatida;
  if(!empId || !mes || !ano || !dia || !tp)
    throw new Error('pedido antigo sem competência/dia — recuse e peça novo');
  const snap = await dbCol('payrolls')
    .where('employeeId','==',empId).where('mes','==',mes).where('ano','==',ano).get();
  let docId, dias, createdAt;
  if(!snap.empty){ const folha=_pickPayrollDoc(snap.docs); docId=folha.id; dias=[...((folha.pontoManualDias)||[])]; createdAt=folha.createdAt||new Date().toISOString(); }
  else { docId = Date.now().toString(36)+Math.random().toString(36).slice(2,8); dias=[]; createdAt=new Date().toISOString(); }
  let entry = dias.find(d => d.dia === dia);
  if(!entry){ entry = { dia, diaSem: (p.diaSem!=null?p.diaSem:new Date(ano,mes-1,dia).getDay()), entrada:'', saida:'', intIni:'', intFim:'' }; dias.push(entry); }
  entry[tp] = horarioEfetivo;
  entry[tp+'_origem'] = 'app';
  entry[tp+'_foraHorario'] = true;
  entry[tp+'_autorizadoPorId']   = currentUser.id || '';
  entry[tp+'_autorizadoPorNome'] = currentUser.username || '';
  entry[tp+'_autorizadoEm']      = new Date().toISOString();
  entry[tp+'_autorizacaoId']     = p.id;
  entry[tp+'_motivoPedido']      = p.motivo || '';
  if(p.geo) entry[tp+'_geo'] = p.geo;
  // Pedido de HORA EXTRA: ao liberar a batida, a HE do dia já fica APROVADA na folha
  // (a aprovação do supervisor É a aprovação da HE). #regra-ponto-he-atraso
  if(p.tipoBloqueio === 'horaExtra'){
    entry.heReview = { status:'aprovado', perc:50, observacao:'HE aprovada via pedido de ponto',
      aprovadoPor: currentUser.username || '', aprovadoEm: new Date().toISOString(),
      recusadoPor:null, recusadoEm:null };
  }
  await dbCol('payrolls').doc(docId).set({
    id:docId, employeeId:empId, mes, ano, pontoManualDias:dias,
    updatedAt:new Date().toISOString(), createdAt
  }, { merge:true });
}

async function autorizarPedido(pedidoId){
  const p = pedidos.find(x => x.id === pedidoId);
  if(!p) return;
  if(!confirm(`Autorizar e REGISTRAR na folha a batida de ${p.employeeNome}?\n\n${NOMES_BATIDA[p.tipoBatida]||p.tipoBatida} às ${p.horarioReal}.`)) return;
  const agora = new Date().toISOString();
  try{
    // 1) grava a batida na folha (no horário real); 2) marca o pedido como autorizado.
    await _gravarBatidaNaFolha(p, p.horarioReal);
    await dbCol('autorizacoesPonto').doc(pedidoId).update({
      status: 'autorizada',
      autorizadoPorId:   currentUser.id || '',
      autorizadoPorNome: currentUser.username || '',
      autorizadoEm:      agora,
      batidaGravada:     true,
    });
    toast(`✅ Autorizado e registrado na folha — ${p.employeeNome}`, 'success');
  }catch(e){
    console.error(e);
    toast('Erro ao autorizar: ' + (e.message||e), 'error');
  }
}

// Edita o horário antes de registrar (ex.: usar o previsto pra ABONAR o desvio,
// sem gerar atraso/HE). O supervisor controla o que conta pelo horário. #ponto-provisorio
async function editarERegistrar(pedidoId){
  const p = pedidos.find(x => x.id === pedidoId);
  if(!p) return;
  const _empE = employeesCache.find(e=>e.id===p.employeeId);
  const prevEf = _previstoDoDiaSup(_empE, p.mesComp, p.anoComp, p.diaBatida, p.tipoBatida) || p.horarioPrevisto || '';
  const sugestao = prevEf || p.horarioReal || '';
  const txt = prompt(
    'Horário a REGISTRAR na folha (HH:MM):\n\n'
    + '• Real da batida: ' + (p.horarioReal||'—') + (prevEf ? '\n• Previsto (escala atual): ' + prevEf : '')
    + '\n\nDica: use o PREVISTO para abonar o desvio (sem atraso/HE).',
    sugestao);
  if(txt === null) return;
  let hhmm = (txt||'').trim();
  const m = hhmm.match(/^(\d{1,2}):(\d{2})$/);
  if(!m || +m[1] > 23 || +m[2] > 59){ toast('Horário inválido. Use HH:MM (ex.: 07:00).', 'error'); return; }
  hhmm = String(+m[1]).padStart(2,'0') + ':' + m[2];
  if(!confirm(`Registrar na folha a batida de ${p.employeeNome} às ${hhmm} (${NOMES_BATIDA[p.tipoBatida]||p.tipoBatida})?`)) return;
  const agora = new Date().toISOString();
  try{
    await _gravarBatidaNaFolha(p, hhmm);
    await dbCol('autorizacoesPonto').doc(pedidoId).update({
      status: 'autorizada',
      autorizadoPorId:   currentUser.id || '',
      autorizadoPorNome: currentUser.username || '',
      autorizadoEm:      agora,
      batidaGravada:     true,
      horarioEditado:    hhmm,
    });
    toast(`✅ Registrado às ${hhmm} — ${p.employeeNome}`, 'success');
  }catch(e){
    console.error(e);
    toast('Erro ao registrar: ' + (e.message||e), 'error');
  }
}

  let html = `<div class="lista-sec-title">Busca: ${emp.nome}</div>`;
  html += `<div class="busca-result">
    <div class="br-nome">${emp.nome||'—'}</div>
    <div class="br-info">
      Matricula ${emp.registro?String(emp.registro).padStart(4,'0'):'—'} · ${emp.cargo||'—'}<br>
      Posto ${emp.posto||'—'} · ${emp.status==='ativo'?'Ativo':emp.status||'—'}
    </div>
  </div>`;
  if(peds.length === 0){
    html += `<div class="empty"><div class="empty-icon">📭</div>
      <div style="font-size:14px">Sem pedidos pendentes</div>
      <div style="font-size:12px;margin-top:6px;color:#cbd5e1">Este colaborador nao solicitou autorizacao agora.</div>
    </div>`;
  } else {
    html += `<div class="lista-sec-title">Pedidos pendentes deste colaborador (${peds.length})</div>`;
    html += peds.map(p => _cardPedido(p)).join('');
  }
  // Botao de voltar pra lista geral
  html += `<button onclick="document.getElementById('search-input').value='';renderPedidos()" style="width:100%;padding:11px;background:#fff;color:#1976D2;border:1px solid #cbd5e1;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px">← Voltar à lista geral</button>`;
  wrap.innerHTML = html;
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if(e.key==='Enter') buscarPorMatricula();
});

// ─── INIT ──────────────────────────────────────────────────────────────────
// Tenta restaurar sessao salva
window.addEventListener('load', async () => {
  // Se o Firebase Auth ja tem usuario (refresh), tenta restaurar
  firebase.auth().onAuthStateChanged(async fu => {
    if(fu && !fu.isAnonymous){
      const saved = sessionStorage.getItem('drg_sup_user');
      if(saved){
        try{
          currentUser = JSON.parse(saved);
          document.getElementById('login-screen').style.display='none';
          document.getElementById('app').style.display='flex';
          renderTopbar();
          await carregarEmployees();
          iniciarListenerPedidos();
          return;
        }catch(_){}
      }
    }
  });
});

// Re-renderiza a cada 30s para atualizar o "X min atras"
setInterval(() => {
  if(pedidos.length > 0) renderPedidos();
}, 30000);

// ─── SERVICE WORKER + DETECTOR DE NOVA VERSAO ─────────────────────────────
if('serviceWorker' in navigator){
  const _swInicial = !!navigator.serviceWorker.controller;
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('supervisor-sw.js?v=6').then(reg => {
      const checar = () => { try{ reg.update(); }catch(_){} };
      document.addEventListener('visibilitychange', () => {
        if(document.visibilityState === 'visible') checar();
      });
      setInterval(checar, 30*60*1000);
    }).catch(() => {});
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(_swInicial) document.getElementById('banner-nova-versao').style.display='';
    });
  });
}
</script>
</body>
</html>
